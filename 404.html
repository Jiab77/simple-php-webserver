<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>404 - File Not Found</title>

    <!-- Fomantic UI CSS v2.9.4 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/fomantic-ui/2.9.4/semantic.min.css" integrity="sha512-ySrYzxj+EI1e9xj/kRYqeDL5l1wW0IWY8pzHNTIZ+vc1D3Z14UDNPbwup4yOUmlRemYjgUXsUZ/xvCQU2ThEAw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <style>
        body {
            background-color: #0c0e17;
            color: #e1e7f0;
            font-family: 'Lato', 'Helvetica Neue', Arial, Helvetica, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }

        .error-card {
            background: rgba(17, 20, 34, 0.85) !important;
            border: 1px solid rgba(255, 255, 255, 0.08) !important;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5) !important;
            border-radius: 12px !important;
            backdrop-filter: blur(10px);
            max-width: 500px;
            width: 90%;
            padding: 3rem !important;
            text-align: center;
        }

        .glow-red {
            text-shadow: 0 0 20px rgba(2db, 43, 36, 0.6);
            color: #ff6b6b !important;
        }

        .neon-divider {
            height: 1px;
            background: linear-gradient(90deg, rgba(255, 107, 107, 0) 0%, rgba(255, 107, 107, 0.4) 50%, rgba(255, 107, 107, 0) 100%);
            margin: 1.5rem 0 2rem 0;
        }

        .message-sub {
            color: #8b9bb4;
            font-size: 1.1rem;
            margin-bottom: 2rem;
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <div class="ui inverted segment error-card">
        <h1 class="ui icon header inverted" style="background: transparent;">
            <i class="exclamation triangle icon glow-red"></i>
            <div class="content glow-red" style="font-size: 2.2rem; margin-top: 1rem; font-weight: 700;">
                Error 404
            </div>
        </h1>
        
        <div class="neon-divider"></div>

        <p class="message-sub">
            The requested file or resource could not be found on this local server. 
            Double-check the URI path or go back to browse public directory.
        </p>

        <a href="/" class="ui button inverted red basic size large" style="border-radius: 6px;">
            <i class="angle double left icon"></i> Back to Dashboard
        </a>
    </div>

    <!-- jQuery and Fomantic UI Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js" integrity="sha512-v2CJ7UaYy4JwqLDIrZUI/4hqeoQieOmAZNXBeQyjo21dadnwR+8ZaIJVT8EE2iyI61OV8e6M8PP2/4hpQINQ/g==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fomantic-ui/2.9.4/semantic.min.js" integrity="sha512-Y/wIVu+S+XJsDL7I+nL50kAVFLMqSdvuLqF2vMoRqiMkmvcqFjEpEgeu6Rx8tpZXKp77J8OUpMKy0m3jLYhbbw==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
</body>
</html>
